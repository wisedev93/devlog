<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="JPEG 8x8 block — top-left DC coefficient, bottom-right high-frequency AC, diagonal frequency direction">
  <defs>
    <linearGradient id="freqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <pattern id="grid8" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 L 0 30" fill="none" stroke="#475569" stroke-width="0.6"/>
    </pattern>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    :root {
      --bg: #ffffff;
      --fg-head: #111827;
      --fg-sub: #6b7280;
      --fg-axis: #374151;
      --border: #1e293b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e293b;
        --fg-head: #f1f5f9;
        --fg-sub: #94a3b8;
        --fg-axis: #cbd5e1;
        --border: #64748b;
      }
    }
    .bg      { fill: var(--bg); }
    .axis    { font: italic 13px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: var(--fg-axis); }
    .lblHead { font: 600 14px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: var(--fg-head); }
    .lblSub  { font: 12px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: var(--fg-sub); }
    .frame   { stroke: var(--border); }
    /* 그리드 내부는 밝은 그라디언트 배경 위라 두 테마 공통 색을 유지한다 */
    .dc      { font: 800 13px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #1e3a8a; text-anchor: middle; dominant-baseline: middle; }
    .ac      { font: 500 11px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect class="bg" fill="#ffffff" x="0" y="0" width="600" height="360" rx="8"/>

  <text x="300" y="28" class="axis" text-anchor="middle">저주파 ──────────────────► 고주파</text>

  <g transform="translate(180, 55)">
    <rect width="240" height="240" fill="url(#freqGrad)" rx="3"/>
    <rect width="240" height="240" fill="url(#grid8)"/>

    <rect x="0" y="0" width="30" height="30" fill="#bfdbfe"/>
    <rect x="0" y="0" width="30" height="30" fill="none" stroke="#1e293b" stroke-width="1"/>
    <text x="15" y="15" class="dc">DC</text>

    <text x="45"  y="15"  class="ac">AC</text>
    <text x="75"  y="15"  class="ac">AC</text>
    <text x="105" y="15"  class="ac">AC</text>
    <text x="135" y="15"  class="ac">⋯</text>

    <text x="15"  y="45"  class="ac">AC</text>
    <text x="15"  y="75"  class="ac">AC</text>
    <text x="15"  y="105" class="ac">⋯</text>

    <text x="45"  y="45"  class="ac">AC</text>
    <text x="75"  y="75"  class="ac">AC</text>

    <text x="225" y="135" class="ac">⋮</text>
    <text x="135" y="225" class="ac">⋯</text>
    <text x="225" y="225" class="ac">AC</text>

    <line x1="22" y1="22" x2="218" y2="218" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowHead)" opacity="0.85"/>

    <rect class="frame" stroke="#1e293b" width="240" height="240" fill="none" stroke-width="1.5" rx="3"/>
  </g>

  <text x="20"  y="90"  class="lblHead">저주파</text>
  <text x="20"  y="108" class="lblSub">큰 영역 변화</text>
  <text x="20"  y="124" class="lblSub">(블록 평균 톤)</text>

  <text x="445" y="300" class="lblHead">고주파</text>
  <text x="445" y="318" class="lblSub">미세 디테일</text>
  <text x="445" y="334" class="lblSub">(엣지·텍스처)</text>
</svg>
